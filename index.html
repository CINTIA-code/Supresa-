<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Larissa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
background:#ffd6e7;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
position:relative;
z-index:2;
text-align:center;
background:rgba(255,255,255,0.6);
padding:40px;
border-radius:20px;
backdrop-filter: blur(10px);
}

h1{
color:#444;
}

#contador{
font-size:25px;
margin-top:20px;
}

.mensagem{
display:none;
margin-top:20px;
color:#444;
line-height:1.6;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
background:#ff9ecf;
border-radius:50%;
animation: subir 10s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>Algo especial está chegando ✨</h1>

<h2>Larissa</h2>

<div id="contador"></div>

<div class="mensagem" id="mensagem">

Larissa,

Você é diferente.  
Autêntica.  
Daquelas pessoas que não passam despercebidas.  

Seu jeito é arte,  
seu sorriso é luz,  
sua existência é algo raro.  

O mundo fica mais bonito  
simplesmente porque você existe.  

Feliz aniversário ✨💗

</div>

</div>

<script>

// CONTAGEM

var data = new Date("April 5, 2026 00:00:00").getTime();

var x = setInterval(function(){

var agora = new Date().getTime();
var distancia = data - agora;

var dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
var horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
var segundos = Math.floor((distancia % (1000 * 60)) / 1000);

document.getElementById("contador").innerHTML =
dias + "d " + horas + "h " +
minutos + "m " + segundos + "s ";

if (distancia < 0) {
clearInterval(x);
document.getElementById("contador").style.display = "none";
document.getElementById("mensagem").style.display = "block";
}

}, 1000);


// BALÕES

function criarBalao(){
let balao = document.createElement("div");
balao.classList.add("balloon");

balao.style.left = Math.random() * 100 + "vw";
balao.style.animationDuration = (5 + Math.random() * 5) + "s";

document.body.appendChild(balao);

setTimeout(()=>{
balao.remove();
},10000);
}

setInterval(criarBalao,1000);


// PARTICULAS

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2,
speed: Math.random()*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y += p.speed;

if(p.y > canvas.height){
p.y = 0;
}

ctx.fillStyle = "white";
ctx.fillRect(p.x,p.y,p.size,p.size);
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
