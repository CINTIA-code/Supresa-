<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Larissa ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#ffd6e7;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.container{
position:relative;
z-index:2;
background:rgba(255,255,255,0.7);
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
backdrop-filter: blur(10px);
}

h1{
font-size:18px;
margin-bottom:10px;
color:#444;
}

#contador{
font-size:20px;
font-weight:bold;
color:#ff6fa5;
}

.mensagem{
display:none;
font-size:15px;
line-height:1.6;
color:#444;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}

.balloon{
position:absolute;
bottom:-100px;
width:25px;
height:35px;
background:#ff8fb1;
border-radius:50%;
animation: subir linear infinite;
}

@keyframes subir{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>Algo bonito está chegando ✨</h1>

<div id="contador"></div>

<div class="mensagem" id="mensagem">

Larissa,

Você é daquelas pessoas  
que não passam despercebidas.  

Autêntica, leve, diferente.  

Seu jeito tem algo raro,  
algo que não se explica  
mas se sente.  

O mundo fica mais bonito  
quando você está nele.  

Feliz aniversário ✨💗

</div>

</div>

<script>

// CONTAGEM REGRESSIVA

var data = new Date("April 5, 2026 00:00:00").getTime();

var x = setInterval(function(){

var agora = new Date().getTime();
var distancia = data - agora;

var dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
var horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
var segundos = Math.floor((distancia % (1000 * 60)) / 1000);

document.getElementById("contador").innerHTML =
dias + "d " + horas + "h " +
minutos + "m " + segundos + "s ";

if (distancia < 0) {
clearInterval(x);
document.getElementById("contador").style.display = "none";
document.getElementById("mensagem").style.display = "block";
}

}, 1000);


// BALÕES

function criarBalao(){
let balao = document.createElement("div");

balao.classList.add("balloon");

balao.style.left = Math.random() * 100 + "vw";
balao.style.animationDuration = (6 + Math.random() * 6) + "s";

document.body.appendChild(balao);

setTimeout(()=>{
balao.remove();
},12000);
}

setInterval(criarBalao,1200);


// PARTICULAS LARISSA

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function criarTexto(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "white";
ctx.font = "bold 60px Arial";
ctx.textAlign = "center";

ctx.fillText("Larissa", canvas.width/2, canvas.height/2);

const textData = ctx.getImageData(0,0,canvas.width,canvas.height);

particles = [];

for(let y=0; y<canvas.height; y+=6){
for(let x=0; x<canvas.width; x+=6){

const index = (y * canvas.width + x) * 4;

if(textData.data[index+3] > 128){
particles.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
tx: x,
ty: y
});
}

}
}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x += (p.tx - p.x) * 0.03;
p.y += (p.ty - p.y) * 0.03;

ctx.fillStyle = "#ff8fb1";
ctx.fillRect(p.x, p.y, 2, 2);

});

requestAnimationFrame(animate);

}

criarTexto();
animate();

window.addEventListener("resize", ()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
criarTexto();
});

</script>

</body>
</html>
