<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Larissa ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: black;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

.container{
position:absolute;
top:20px;
text-align:center;
width:100%;
z-index:2;
}

#contador{
font-size:18px;
letter-spacing:2px;
color:#a0ffe6;
}

.mensagem{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
display:none;
font-size:16px;
line-height:1.6;
padding:20px;
}

</style>

</head>

<body>

<canvas id="aurora"></canvas>
<canvas id="particles"></canvas>

<div class="container">
<div id="contador"></div>
</div>

<div class="mensagem" id="mensagem">

Larissa,

Você tem algo raro.  
Algo que não se explica,  
mas se sente.  

Seu jeito é arte,  
sua presença é luz,  
sua essência é única.  

Feliz aniversário ✨

</div>

<script>

// CONTAGEM

var data = new Date("April 5, 2026 00:00:00").getTime();

var x = setInterval(function(){

var agora = new Date().getTime();
var distancia = data - agora;

var dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
var horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
var segundos = Math.floor((distancia % (1000 * 60)) / 1000);

document.getElementById("contador").innerHTML =
dias+"d "+horas+"h "+minutos+"m "+segundos+"s";

if(distancia < 0){
clearInterval(x);
document.getElementById("contador").style.display="none";
document.getElementById("mensagem").style.display="block";
}

},1000);


// AURORA BOREAL

const aurora = document.getElementById("aurora");
const actx = aurora.getContext("2d");

aurora.width = window.innerWidth;
aurora.height = window.innerHeight;

function drawAurora(){

let gradient = actx.createLinearGradient(0,0,aurora.width,aurora.height);

gradient.addColorStop(0,"#ff00ff22");
gradient.addColorStop(0.3,"#00ffee22");
gradient.addColorStop(0.6,"#7b00ff22");
gradient.addColorStop(1,"#00ffcc22");

actx.fillStyle = gradient;
actx.fillRect(0,0,aurora.width,aurora.height);

requestAnimationFrame(drawAurora);

}

drawAurora();


// PARTICULAS

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

let image = new Image();
image.src = "https://i.imgur.com/8Km9tLL.png"; // placeholder

image.onload = function(){

ctx.drawImage(image, canvas.width/4, canvas.height/6, 250, 350);

const data = ctx.getImageData(0,0,canvas.width,canvas.height);

for(let y=0;y<canvas.height;y+=4){
for(let x=0;x<canvas.width;x+=4){

let index = (y * canvas.width + x) * 4;

if(data.data[index+3] > 128){

particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
tx:x,
ty:y
});

}

}
}

animate();

}


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x += (p.tx - p.x) * 0.02;
p.y += (p.ty - p.y) * 0.02;

ctx.fillStyle = "rgba(255,0,255,0.8)";
ctx.fillRect(p.x,p.y,1.5,1.5);

});

requestAnimationFrame(animate);

}

</script>

</body>
</html>
